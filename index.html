<style>

/* GLOBAL */

html,body{
height:100%;
margin:0;
font-family: "Segoe UI", Arial;
background:#f4f6f9;
overflow:hidden;
}

/* NAVBAR */

.navbar{
height:60px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* PAGE LAYOUT */

.page-container{
display:flex;
height:calc(100vh - 60px);
}

/* SIDEBAR */

.sidebar{

width:240px;
background:#1e293b;
color:white;
padding-top:20px;
transition:0.3s;
}

.sidebar a{

display:block;
padding:12px 20px;
color:#cbd5e1;
text-decoration:none;
}

.sidebar a:hover{

background:#334155;
color:white;
}

/* COLLAPSED SIDEBAR */

.sidebar.collapsed{

width:70px;
}

/* MAIN AREA */

.main{

flex:1;
display:flex;
flex-direction:column;
}

/* KPI SECTION */

.kpi-section{

padding:15px;
background:#f4f6f9;
}

.kpi-card{

border:none;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

/* DASHBOARD AREA */

.dashboard-area{

flex:1;
padding:10px;
}

.dashboard-container{

height:100%;
background:white;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
overflow:hidden;
}

/* TABLEAU */

.tableauPlaceholder{

width:100%;
height:100%;
}

.tableauViz{

width:100%;
height:100%;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{

position:absolute;
z-index:1000;
height:100%;
}

}

</style>

</head>
