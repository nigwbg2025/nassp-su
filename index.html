/* NAVBAR */

.navbar{

.portal-header{

}

/* DASHBOARD AREA */

.dashboard-area{
height:calc(100vh - 210px);

padding:10px;
}

/* DASHBOARD CONTAINER */

.dashboard-container{
position:relative;
height:100%;
width:100%;
background:white;

box-shadow:0 4px 20px rgba(0,0,0,0.08);

}

/* TABLEAU CONTAINER */

.tableauPlaceholder{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

/* FORCE TABLEAU TO FILL SCREEN */

.tableauViz{
position:absolute !important;
top:0;
left:0;
width:100% !important;
height:100% !important;
